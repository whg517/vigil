# Vigil Helm Chart 默认配置（生产部署参考）。
# 敏感值（DB 密码、JWT Secret、IM AppSecret）用 existingSecret 引用，不硬编码明文。
#
# 生产部署步骤：
#   1. kubectl create secret generic vigil-secrets \
#        --from-literal=db-password=<...> \
#        --from-literal=redis-password=<...> \
#        --from-literal=jwt-secret=<...>
#   2. helm install vigil ./deploy/helm -f values-prod.yaml

# ★ 现状如实说明：当前 chart 为单 Deployment（API + worker 同进程）+ Service + Ingress（可选）
# + PDB + 迁移 hook Job，仅验证单副本部署。无数据库/Redis subchart（PG/Redis 用外部实例）、
# 无 Asynqmon 模板；api/worker 分离扩缩为路线图。

# 镜像配置
image:
  repository: ghcr.io/kevin/vigil
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# 副本数（单实例起步；多实例需 Redis pub/sub 支持 WebSocket 广播，见架构 §6.4——
# 代码已实现，但多副本形态未经端到端验证，生产暂不建议 >1）
replicaCount: 1

# 数据库（外部 PG，chart 不内置部署；必须装 pgvector 扩展）
database:
  host: ""              # 外部 PG 地址（如 pg-ha.svc.cluster.local）
  port: 5432
  name: vigil
  user: vigil
  existingSecret: vigil-secrets  # Secret 名，含 db-password 键

# Redis（外部实例，chart 不内置部署。★ 每套 Vigil 必须独占 Redis 实例/DB 编号，
# 共用会互抢 Asynq 任务，见 docs/operations.md §1 红线）
redis:
  host: ""
  port: 6379
  existingSecret: vigil-secrets  # 含 redis-password 键（无密码留空）

# Vigil 应用配置（对应 config.Config，非敏感项）
config:
  # 运行环境（development | production）。★ 生产必须 production：
  # production 强制开鉴权，并无条件禁用两个危险开关（SEC-02 修订，双保险）——
  # X-Vigil-User-ID 头回退（VIGIL_AUTH_HEADER_FALLBACK）与无鉴权测试端点
  # /api/v1/__test__/reset（VIGIL_TEST_ENDPOINTS_ENABLED）。二者本身默认已关闭，
  # 仅本地开发/e2e 编排显式开启（如需可经 extraEnv 注入，生产下置 true 也无效）。
  # 默认 production 以防按 chart 部署即裸奔；本地开发可显式覆盖为 development。
  appEnv: "production"
  authEnabled: "true"            # 生产必须开鉴权
  # jwtSecret 从 existingSecret 的 jwt-secret 键读，不在此配置
  ingestionRateLimitPerMin: "600"
  ingestionBackpressureDepth: "10000"
  # 各通道配置（按需启用）
  smtpHost: ""

# 额外环境变量（通用扩展）：注入 deployment 未显式列出的 VIGIL_* 配置，
# 免改模板即可覆盖 config.Config 任意项。列表元素为标准 K8s EnvVar。
# 例：extraEnv:
#       - name: VIGIL_APP_LOG_LEVEL
#         value: "debug"
extraEnv: []

# 数据库迁移 hook（templates/migrate-job.yaml）：pre-install/pre-upgrade 自动执行
# `vigil migrate`（镜像与主 Deployment 同源）。迁移失败 → hook Job 失败 → helm
# install/upgrade 直接失败，新代码不会滚动上线（fail-fast；失败的 Job 保留供 kubectl logs
# 排查，下次 helm 重试时自动清理）。关闭后回到手动迁移：kubectl exec deploy/<release> -- vigil migrate。
migration:
  enabled: true
  backoffLimit: 2             # pod 失败重试次数，超过则 Job 失败（→ helm 失败）
  activeDeadlineSeconds: 300  # Job 总超时兜底（migrate 本身内置 60s 超时，此处含调度/拉镜像余量）
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# 服务暴露
service:
  type: ClusterIP
  port: 8080

# Ingress（模板在 templates/service.yaml 内，enabled=true 时渲染）
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: vigil.example.com
  tls:
    enabled: false
    secretName: vigil-tls

# 资源限制（生产按负载调整）
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

# PodDisruptionBudget（SEC-05/可靠性）：自愿中断时保证最少可用副本。
podDisruptionBudget:
  enabled: true
  minAvailable: 1  # 单副本时阻止节点驱逐中断；多副本可设为 percentage 如 "50%"

# 健康检查（server.go 的 /health 端点）
probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
