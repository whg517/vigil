apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: vigil
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vigil
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vigil
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      # SEC-05：Pod 级安全上下文（最小权限）。
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vigil
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # SEC-05：容器级安全上下文（drop 全部 capabilities + 禁提权 + 只读根文件系统）。
          # FIX-5 验证：vigil 运行时不写 /tmp 之外的路径（logger 走 stderr，无文件日志；
          # 业务代码无 os.Create/WriteFile；唯一文件写入是开发工具 cmd/swagfix，非运行时）。
          # 故只挂载 /tmp（Go runtime/os.TempDir 用）即可安全启用只读根文件系统。
          # 若未来引入文件日志（lumberjack 等）或本地缓存，须额外挂载对应卷。
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # 运行环境（SEC-02）：必须显式注入，否则 config 默认 development——
            # 会挂载无鉴权的测试重置端点并启用 X-Vigil-User-ID 头回退（可冒充任意用户）。
            - name: VIGIL_APP_ENV
              value: {{ .Values.config.appEnv | quote }}
            # 数据库（密码从 Secret 读）
            - name: VIGIL_DB_HOST
              value: {{ .Values.database.host | quote }}
            - name: VIGIL_DB_PORT
              value: {{ .Values.database.port | quote }}
            - name: VIGIL_DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: VIGIL_DB_USER
              value: {{ .Values.database.user | quote }}
            - name: VIGIL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: db-password
            # Redis
            - name: VIGIL_REDIS_ADDR
              value: "{{ .Values.redis.host }}:{{ .Values.redis.port }}"
            {{- if .Values.redis.password }}
            - name: VIGIL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: redis-password
            {{- end }}
            # JWT（生产必配）
            - name: VIGIL_AUTH_ENABLED
              value: {{ .Values.config.authEnabled | quote }}
            - name: VIGIL_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: jwt-secret
            # 限流/背压
            - name: VIGIL_INGESTION_RATE_LIMIT_PER_MIN
              value: {{ .Values.config.ingestionRateLimitPerMin | quote }}
            - name: VIGIL_INGESTION_BACKPRESSURE_DEPTH
              value: {{ .Values.config.ingestionBackpressureDepth | quote }}
            # 通知通道（按需）
            {{- if .Values.config.smtpHost }}
            - name: VIGIL_NOTIFICATION_SMTP_HOST
              value: {{ .Values.config.smtpHost | quote }}
            {{- end }}
            {{- if .Values.config.phoneWebhookUrl }}
            - name: VIGIL_NOTIFICATION_PHONE_WEBHOOK_URL
              value: {{ .Values.config.phoneWebhookUrl | quote }}
            {{- end }}
            # 通用扩展：注入 values.extraEnv 中未在上方显式列出的 VIGIL_* 配置。
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # readOnlyRootFilesystem 下挂载可写 tmp（Go runtime / sqlite 测试 / 临时文件用）。
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
