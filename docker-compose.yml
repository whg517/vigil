# Vigil Docker Compose —— 完整 3 容器部署（vigil + postgres + redis）。
# 对应 tech-stack.md §五：最小部署 3 容器。
#
# 用法：
#   docker compose up -d              # 起全部服务
#   docker compose exec vigil vigil migrate  # 首次启动后建表
#
# 开发模式（vigil 本地 go run 调试）：注释掉 vigil 服务，仅起 postgres + redis。

services:
  postgres:
    # pgvector/pgvector 镜像自带 pgvector 扩展（相似事件检索 M11.4 依赖）。
    # 部署前置：必须用此镜像或自行在 postgres:16 基础上安装 pgvector。
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil
      POSTGRES_DB: vigil
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  vigil:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      VIGIL_DB_HOST: postgres
      VIGIL_DB_USER: vigil
      VIGIL_DB_PASSWORD: vigil
      VIGIL_DB_NAME: vigil
      VIGIL_REDIS_ADDR: redis:6379
      VIGIL_APP_ENV: production
    ports:
      - "8080:8080"
    # 首次启动需先 migrate（取消下行注释执行一次后重启）：
    # command: ["migrate"]

  # Asynqmon —— Asynq 队列可视化面板（T6.2/M15 平台化长尾）。
  # 观测异步任务队列（升级计时器/归一化/聚合/清理等）：待处理/处理中/失败/重试计数、
  # 死信排查、手动重跑。默认注释（可选运维组件，不影响主链路）；需要时取消注释起用。
  # ★ 安全：面板暴露队列内部状态，生产务必置于内网/加鉴权反代之后，勿直接公网暴露。
  # asynqmon:
  #   image: hibiken/asynqmon:latest
  #   depends_on:
  #     redis:
  #       condition: service_healthy
  #   command: ["--redis-addr=redis:6379"]
  #   ports:
  #     - "8081:8080"

volumes:
  pgdata:
