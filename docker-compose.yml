# Vigil 开发/集成验证用 Docker Compose。
# 仅起依赖（PostgreSQL + Redis），vigil 本体本地 go run 运行便于调试。
# 对应 tech-stack.md §五：最小部署 3 容器（vigil + postgres + redis）。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil
      POSTGRES_DB: vigil
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
