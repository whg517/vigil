# Vigil E2E 全栈编排 —— Playwright 前端 e2e 专用。
#
# 与生产 docker-compose.yml 的区别：
#   - 数据卷去掉（e2e 用完即弃，不持久化）
#   - vigil 命令改为先 migrate 再 run（首启自动建表，无需手动步骤）
#   - APP_ENV=development：启用 /__test__/reset 测试端点（生产禁用）
#   - 端口固定映射到宿主机（Playwright 在宿主机/CI runner 上跑）
#
# 由 web/e2e/global-setup.ts 启动、global-teardown.ts 关停。
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil
      POSTGRES_DB: vigil
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  vigil:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      VIGIL_DB_HOST: postgres
      VIGIL_DB_USER: vigil
      VIGIL_DB_PASSWORD: vigil
      VIGIL_DB_NAME: vigil
      VIGIL_REDIS_ADDR: redis:6379
      # development 启用测试 reset 端点；同时 relax 鉴权配置便于 e2e。
      VIGIL_APP_ENV: development
      VIGIL_AUTH_ENABLED: "true"
      VIGIL_AUTH_JWT_SECRET: e2e-test-jwt-secret
      VIGIL_HTTP_ADDR: ":8080"
    ports:
      - "28080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 3s
      timeout: 3s
      retries: 20
    # 先 migrate 再启动：容器启动即建表 + 起服务。
    # 注意：Dockerfile 的 ENTRYPOINT 是 /app/vigil，若用 command: [sh,-c,...] 会变成
    # 「/app/vigil sh -c ...」（sh 被当成 vigil 参数）。这里覆盖 entrypoint 为 sh。
    entrypoint: ["sh", "-c"]
    command: ["/app/vigil migrate && exec /app/vigil"]
