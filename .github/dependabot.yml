# Dependabot 依赖自动升级配置（QA 审计：原无依赖扫描/升级机制）。
# 定期检查 go-modules / npm / docker / github-actions 四类依赖，
# 有新版本或安全公告时自动开 PR。配合 CI 的 govulncheck 形成依赖安全闭环。
# 详见 https://docs.github.com/en/code-security/dependabot
version: 2

updates:
  # Go 模块依赖
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go
    commit-message:
      prefix: build

  # 前端 npm 依赖（web/）
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: build

  # Docker 镜像基线（Dockerfile FROM）
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: build

  # GitHub Actions 版本
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
