name: "功能建议"
description: "提出新功能或改进建议"
title: "[feat] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        提交前建议先浏览仓库内 `docs/adr/0002-product-positioning.md`（产品定位与非目标）——Vigil 聚焦告警的"下一步"（响应/协同/处置/复盘），
        不做监控采集等非目标能力；与定位冲突的建议大概率不会被接受。
  - type: textarea
    id: problem
    attributes:
      label: "问题背景"
      description: "你遇到了什么问题？现在是怎么绕过的？请描述场景而不只是方案。"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: "期望的方案"
      description: "希望 Vigil 怎么解决？涉及交互时可描述期望的 Web/IM 操作路径。"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "替代方案"
      description: "考虑过的其他做法及其不足（可选）。"
  - type: dropdown
    id: contribution
    attributes:
      label: "是否愿意提 PR 实现"
      description: "愿意的话请先在 issue 里对齐设计（见 CONTRIBUTING.md「文档先行」）。"
      options:
        - "愿意，讨论清楚后我来实现"
        - "暂不方便，仅提出建议"
    validations:
      required: true
