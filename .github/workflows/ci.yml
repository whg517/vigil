# Vigil CI —— 对应 development.md §3.4 lint→test→build 门禁。
# 每个 PR/push 自动执行三道门禁，红则阻断合并。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== 后端：Go lint + test + build =====
  backend:
    name: Backend (lint → test → build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # ① Lint（golangci-lint）
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.0.2
          args: --timeout 5m

      # ② OpenAPI spec 漂移检测（与 ent go:generate 同款纪律）
      #    handler 注解是权威源；若改动注解后未重新 `go generate`，此处会失败。
      - name: openapi spec drift check
        run: |
          go generate ./cmd/vigil/...
          git diff --exit-code -- internal/server/gen

      # ③ Test
      - name: go test
        run: go test -race -cover ./internal/... ./cmd/...

      # ④ Build
      - name: go build
        run: go build ./...

  # ===== 前端：lint + build =====
  frontend:
    name: Frontend (lint → build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile

      # ① OpenAPI 类型漂移检测（types.gen.ts 必须与已提交的 spec 同步）
      - name: openapi types drift check
        working-directory: web
        run: |
          pnpm gen:types
          git diff --exit-code -- src/lib/api/types.gen.ts

      # ② Lint
      - name: eslint
        working-directory: web
        run: pnpm lint

      # ③ Build（含 tsc 类型检查）
      - name: build
        working-directory: web
        run: pnpm build

  # ===== E2E：真实 PG(pgvector) + Redis + Asynq 端到端闭环 =====
  # 与 backend/frontend job 并行；用 build tag 隔离，不拖慢默认单测。
  # 对应 docs/development.md §八 e2e 测试。
  e2e:
    name: E2E (postgres pgvector + redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil
          POSTGRES_DB: vigil
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U vigil"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: e2e tests
        run: go test -tags=integration -v -timeout 10m ./internal/e2e/...
