# Vigil CI —— 对应 development.md §3.4 lint→test→build 门禁。
# 每个 PR/push 自动执行三道门禁，红则阻断合并。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== 后端：Go lint + test + build =====
  backend:
    name: Backend (lint → test → build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # ① Lint（golangci-lint）
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.0.2
          args: --timeout 5m

      # ② OpenAPI spec 漂移检测（与 ent go:generate 同款纪律）
      #    handler 注解是权威源；若改动注解后未重新 `go generate`，此处会失败。
      - name: openapi spec drift check
        run: |
          go generate ./cmd/vigil/...
          git diff --exit-code -- internal/server/gen

      # ③ Test
      - name: go test
        run: go test -race -cover ./internal/... ./cmd/...

      # ④ Build
      - name: go build
        run: go build ./...

  # ===== 前端：lint + build =====
  frontend:
    name: Frontend (lint → build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile

      # ① OpenAPI 类型漂移检测（types.gen.ts 必须与已提交的 spec 同步）
      - name: openapi types drift check
        working-directory: web
        run: |
          pnpm gen:types
          git diff --exit-code -- src/lib/api/types.gen.ts

      # ② Lint
      - name: eslint
        working-directory: web
        run: pnpm lint

      # ③ Build（含 tsc 类型检查）
      - name: build
        working-directory: web
        run: pnpm build
