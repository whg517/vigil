# Vigil CI —— 对应 development.md §3.4 lint→test→build 门禁。
# 每个 PR/push 自动执行三道门禁，红则阻断合并。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ===== 后端：Go lint + test + build =====
  backend:
    name: Backend (lint → test → build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # ① Lint（golangci-lint）
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.0.2
          args: --timeout 5m

      # ② OpenAPI spec 漂移检测（与 ent go:generate 同款纪律）
      #    handler 注解是权威源；若改动注解后未重新 `go generate`，此处会失败。
      - name: openapi spec drift check
        run: |
          go generate ./cmd/vigil/...
          git diff --exit-code -- internal/server/gen

      # ③ Test + 覆盖率门禁（QA 审计：原仅 -cover 打印百分比，无阈值不阻断）
      #    生成 coverprofile，总覆盖率低于阈值（45%）则 fail；产物归档供排查。
      - name: go test (with coverage gate)
        run: |
          go test -race -coverpkg=./internal/...,./cmd/... -coverprofile=coverage.out ./internal/... ./cmd/...
          # 总覆盖率（mode set/atomic 的行覆盖百分比）
          COV=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3+0}')
          echo "Total coverage: ${COV}%"
          THRESHOLD=45
          if awk "BEGIN {exit !(${COV} < ${THRESHOLD})}"; then
            echo "::error::Coverage ${COV}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage ${COV}% >= ${THRESHOLD}% ✓"

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out
          retention-days: 7

      # ④ Build
      - name: go build
        run: go build ./...

  # ===== 前端：lint + build =====
  frontend:
    name: Frontend (lint → build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile

      # ① OpenAPI 类型漂移检测（types.gen.ts 必须与已提交的 spec 同步）
      - name: openapi types drift check
        working-directory: web
        run: |
          pnpm gen:types
          git diff --exit-code -- src/lib/api/types.gen.ts

      # ② Lint
      - name: eslint
        working-directory: web
        run: pnpm lint

      # ③ Build（含 tsc 类型检查）
      - name: build
        working-directory: web
        run: pnpm build

  # ===== 安全扫描（QA 审计：原仅 golangci-lint 静态扫描，无依赖漏洞扫描）=====
  # govulncheck 检测 Go 依赖的已知漏洞（CVE），命中则阻断。轻量、官方维护。
  # 依赖的定期升级由 .github/dependabot.yml 负责。
  security:
    name: Security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.25"
          # 扫描业务代码（含 cmd），排除 ent 生成代码噪声
          # 注：默认扫描整个 module；如生成代码误报，在此加 -scan-package 调整

  # ===== E2E：真实 PG(pgvector) + Redis + Asynq 端到端闭环 =====
  # 与 backend/frontend job 并行；用 build tag 隔离，不拖慢默认单测。
  # 对应 docs/development.md §八 e2e 测试。
  e2e:
    name: E2E (postgres pgvector + redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil
          POSTGRES_DB: vigil
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U vigil"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: e2e tests
        run: go test -tags=integration -v -timeout 10m ./test/e2e/...

  # ===== 前端 E2E：Playwright 全栈黑盒测试（真实 Docker 全栈，禁 mock）=====
  # 与 backend/frontend/e2e job 并行。globalSetup 自动起 docker-compose.e2e.yml
  # 全栈（postgres + redis + vigil，vigil 含前端 embed），spec 跑完 globalTeardown 关停。
  # 对应 docs/development.md §前端 e2e。
  frontend-e2e:
    name: Frontend E2E (Playwright 全栈)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: install playwright browsers
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      # globalSetup 内部 docker compose up --build 起 vigil 镜像（多阶段构建含前端 embed）
      - name: playwright e2e（globalSetup 自动起全栈）
        working-directory: web
        run: pnpm e2e

      - name: upload playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
